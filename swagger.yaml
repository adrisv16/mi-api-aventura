openapi: 3.0.0
info:
  title: API de Mi Aventura
  version: 1.0.0
  description: Documentación interactiva de tu API con Swagger

servers:
  - url: https://mi-api-aventura.vercel.app

paths:
  /api/v1/login:
    post:
      summary: Genera un token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Token generado
        "401":
          description: Credenciales inválidas

  /api/v1/usuarios:
    get:
      summary: Obtiene la lista de usuarios (requiere JWT)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuarios
        "401":
          description: Token no proporcionado
        "403":
          description: Token inválido

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
